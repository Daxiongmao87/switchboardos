<div class="app-frame">
  <header class="titlebar">
    <div class="titlebar-content">
      <span class="titlebar-title">{{ title }}</span>
      <span class="titlebar-context">Local-first operations shell</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" (click)="minimize()" title="Minimize" aria-label="Minimize">
        -
      </button>
      <button class="titlebar-btn" (click)="maximize()" title="Maximize" aria-label="Maximize">
        []
      </button>
      <button class="titlebar-btn titlebar-btn-close" (click)="close()" title="Close" aria-label="Close">
        x
      </button>
    </div>
  </header>

  <div class="shell-body">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="sidebar-header">
        <span class="workspace-label">Workspace</span>
        <span class="workspace-name">Local MVP</span>
      </div>

      <nav class="primary-nav">
        <a
          *ngFor="let item of navItems"
          class="nav-link"
          [routerLink]="item.path"
          routerLinkActive="is-active"
        >
          <span class="nav-label">{{ item.label }}</span>
          <span class="nav-detail">{{ item.detail }}</span>
        </a>
      </nav>
    </aside>

    <main class="shell-content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <footer class="taskbar">
    <div class="taskbar-section">
      <span class="taskbar-label">SwitchboardOS</span>
      <span class="taskbar-muted">Renderer ready</span>
    </div>
    <div class="taskbar-section taskbar-spacer"></div>
    <div class="taskbar-section taskbar-info">
      <span *ngIf="appInfo" class="taskbar-version">v{{ appInfo.version }}</span>
      <span *ngIf="appInfo" class="taskbar-muted">{{ appInfo.platform }}</span>
      <span class="taskbar-status" title="Ready"></span>
    </div>
  </footer>
</div>
